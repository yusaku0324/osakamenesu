name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -q -r requirements-test.txt

      - name: Ensure trio available
        run: pip install -q trio

      - name: Run pytest
        run: pytest app/tests -q

  integration-test:
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run docker-compose integration tests
        env:
          DOCKER_BUILDKIT: 1
        run: |
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from api-test api-test

      - name: Teardown integration stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  web-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Next.js lint
        run: npm run lint

  admin-e2e:
    needs:
      - web-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run admin E2E tests
        env:
          ADMIN_BASIC_USER: ${{ secrets.ADMIN_BASIC_USER }}
          ADMIN_BASIC_PASS: ${{ secrets.ADMIN_BASIC_PASS }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: npm run test:e2e -- --grep "Admin"
